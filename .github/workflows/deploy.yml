name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      # Trunk.toml pins wasm-bindgen to 0.2.114 (matching the Nix toolchain).
      # Install the matching CLI so the pinned `path = "wasm-bindgen"` resolves on PATH.
      - name: Install wasm-bindgen-cli 0.2.114
        run: cargo install wasm-bindgen-cli --version 0.2.114

      - name: Build (release)
        run: trunk build --release

      - name: Copy CNAME into dist
        run: cp CNAME dist/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
